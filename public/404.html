<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Touchline</title>
    <!--
      GitHub Pages serves this file for any unknown path. It rewrites the URL into a
      query string and redirects to the app's index, where the head script restores the
      real route. Single-page-apps-for-github-pages technique (pathSegmentsToKeep = 1
      keeps the /world-cup-llm-benchmark/ project-page segment).
    -->
    <script>
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
